{% extends 'base.html' %}
{% block title %}Edit Settings{% endblock %}
{% block content %}

<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-lg p-5" style="width: 80%; max-width: 600px; border-radius: 15px;">

        
        <h2 class="text-center mb-4" style="font-weight: 600;">
            Edit Settings
        </h2>
        
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            
            <div class="text-center mt-4">
                <button class="btn btn-success px-4 py-2">
                    Update Profile
                </button>
            </div>
        </form>

    </div>
</div>

{% endblock %}
