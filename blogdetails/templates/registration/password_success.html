{% extends 'base.html' %}
{% block title %}Password Updated{% endblock %}
{% block content %}

<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-lg p-5 text-center" style="width: 80%; max-width: 500px; border-radius: 15px;">

        <!-- Success Icon -->
        <div class="mb-3">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
        </div>

        <!-- Message -->
        <h2 class="mb-3" style="font-weight: 600;">Password Updated!</h2>
        <p class="text-muted mb-4">
            Your password has been changed successfully. You can now continue using your account securely.
        </p>

        <!-- Button -->
        <a href="{% url 'home' %}" class="btn btn-success px-4 py-2">
            Go to Home
        </a>

    </div>
</div>

{% endblock %}
