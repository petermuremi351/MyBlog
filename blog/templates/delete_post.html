 {% extends 'base.html' %}
{% block title %}Edit Blog Post{% endblock %}
{% block content %}

{% if user.is_authenticated %}

<h1>Delete Post</h1>


<h3>Delete: {{ post.title }}</h3>
<div class="form-group">
    <strong>Are You Sure!</strong>
    <br/><br/>
<form method="POST">
    {% csrf_token %}
    
    <button class="btn btn-secondary">Delete Post!</button>
</form>
</div>

{% else %}

YOU ARE NOT LOGIN...

{% endif %}
{% endblock %}
